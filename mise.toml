[settings]
python.uv_venv_auto = true

[tools]
python = "3.14.6"
uv = "0.11.21"
ruff = "0.15.17"
bun = "1.3.14"
biome = "2.5.0"

# Dependencies
[tasks.sync]
description = "Install all dependencies (workspace + API)"
run = [
  "uv sync --all-packages --extra dev",
  "cd apps/api && uv sync --extra dev",
]

[tasks.update]
description = "Update all dependencies"
alias = "u"
run = "uv sync --all-packages --extra dev -U"

[tasks.outdated]
description = "List outdated dependencies"
run = "uv pip list --outdated"

# Code quality
[tasks.format]
description = "Format and fix linting issues"
run = ["ruff format", "ruff check --fix"]

[tasks.lint]
description = "Run type checking on all packages"
run = [
  "uv run --all-packages --extra dev mypy --exclude apps/api .",
  "cd apps/api && uv run mypy .",
]

[tasks.check]
description = "Quick pre-push checks: format, lint, test-unit, validate-snippets"
depends = ["format", "lint", "test-unit", "validate-snippets"]

# Testing
[tasks.test]
description = "Run the full offline suite: unit + cassette replay (no network, <1 sec)"
run = "uv run --all-packages --extra dev pytest --block-network packages/core/tests"

[tasks.test-unit]
description = "Run unit tests only (fast: <1 sec)"
run = "uv run --all-packages --extra dev pytest packages/core/tests/unit"

[tasks.test-record]
description = "Re-fetch every plugin fixture through the proxy, refresh cassettes + snapshots"
run = "uv run --all-packages --extra dev --env-file .env pytest -vv -rA --log-cli-level=INFO packages/core/tests/plugins --record-mode=rewrite --snapshot-update"

[tasks.proxy-probe]
description = "Make an ad-hoc request through the rotating proxy (e.g. mise run proxy-probe -- <url> -X POST)"
run = "uv run --all-packages --extra dev --env-file .env python -m tests.plugins.probe"
dir = "packages/core"

# Development: CLI
[tasks.dev-cli]
description = "Run CLI during development (e.g., mise run dev-cli -- extract <url>)"
run = "uv run --all-packages --extra dev megaloader"

# Development: API
[tasks.api-serve]
description = "Run local API server"
run = "uv run uvicorn index:app --reload" # pass '--host 0.0.0.0' to expose on local network
dir = "apps/api"

# Development: Docs
[tasks.docs-serve]
description = "Serve documentation locally"
run = [
  "bun install",
  "bun run docs:dev",
] # pass '--host' to expose the server in local network
dir = "apps/docs"

[tasks.docs-build]
description = "Build documentation"
run = ["bun install", "bun run docs:build"]
dir = "apps/docs"

[tasks.format-docs]
description = "Format docs with biome (Vue only, markdown not supported)"
run = [
  "biome format --write .",
  "bun x prettier \"**/*.md\" --write --print-width=80 --prose-wrap=always",
]
dir = "apps/docs"

[tasks.validate-snippets]
description = "Validate Python code snippets in documentation"
run = "uv run --all-packages --extra dev python scripts/validate-code-snippets.py"

# Logo
[tasks.generate-logo]
description = "Generate project logo as SVG"
run = "uv run --all-packages --extra dev python scripts/generate-logo.py"

# Build
[tasks.build-bin]
description = "Build CLI binary locally for testing (Windows only)"
run = [
  "uv pip install pyinstaller",
  "uv run pyinstaller --onefile --name megaloader-cli-windows --paths packages/core packages/cli/megaloader_cli/main.py",
]

# Deploy
[tasks.api-deploy]
description = "Deploy API to Vercel"
run = "vercel --prod"
dir = "apps/api"
