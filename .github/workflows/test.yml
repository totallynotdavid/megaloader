name: tests

# Offline gate: unit tests plus the cassette replay suite. Deterministic, no
# network, no credentials, so it runs on every push and PR. --block-network
# makes a stale or missing cassette fail loudly instead of reaching live sites.
# Live drift detection lives in live.yml (scheduled, allowed to fail).

on:
  push:
    branches: ["main"]
    paths:
      - "pyproject.toml"
      - "packages/core/**/*.py"
      - "packages/core/pyproject.toml"
      - "packages/core/tests/**"
  pull_request:
    branches: ["main"]
    paths:
      - "pyproject.toml"
      - "packages/core/**/*.py"
      - "packages/core/pyproject.toml"
      - "packages/core/tests/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@11245c7e122cd1c2297e8115d1e43fe1570f6270 # v8.2.0
        with:
          version: "0.11.21"

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --package megaloader

      - name: Run tests
        run:
          uv run pytest --block-network -v --tb=short --junitxml=junit.xml -o
          junit_family=legacy

      - name: Coverage & codecov (3.13 only)
        if: matrix.python-version == '3.13'
        run: |
          uv run --with pytest-cov pytest \
            --block-network \
            --cov=megaloader \
            --cov-report=xml \
            --cov-report=term \
            --junitxml=junit.xml \
            -o junit_family=legacy

      - if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage.xml

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./junit.xml
          report_type: test_results
