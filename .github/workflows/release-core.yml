name: release-core

on:
  push:
    tags: ["vcore-*.*.*"]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@21d5da3bc3126fc3b5b182828c8772282a6b694d # v8.1.0
        with:
          version: "0.11.16"
          python-version: "3.14.5"

      - run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/vcore-}"
          CORE_PKG_VERSION=$(grep '^version = ' packages/core/pyproject.toml | cut -d'"' -f2)
          if [ "$TAG_VERSION" != "$CORE_PKG_VERSION" ]; then
            echo "Tag $TAG_VERSION != core package $CORE_PKG_VERSION"
            exit 1
          fi

      - run: uv build --package megaloader

      - uses: actions/upload-artifact@v7
        with:
          name: core-dist
          path: dist/*

  pypi-core:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/project/megaloader

    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: core-dist
          path: dist

      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.0
        with:
          packages-dir: dist/
          print-hash: true
