name: lint and format check

on:
  push:
    branches: ["main"]
    paths:
      - "**/*.py"
      - "**/pyproject.toml"
  pull_request:
    branches: ["main"]
    paths:
      - "**/*.py"
      - "**/pyproject.toml"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@ca5ddd015e07666cb1f1340ad6171f5e7afffb3e # v8.2.0
        with:
          version: "0.11.21"

      - run: uv python install 3.14.6

      - name: Install workspace dependencies
        run: uv sync --all-packages --extra dev

      - name: Install API dependencies
        run: cd apps/api && uv sync --extra dev

      - uses: astral-sh/ruff-action@2f886796233dd932a419c469cee06063a017922e # v4.0.0
        with:
          args: "format --check --diff"

      - uses: astral-sh/ruff-action@2f886796233dd932a419c469cee06063a017922e # v4.0.0
        with:
          args: "check"

      - name: Type check workspace
        run: uv run mypy --exclude apps/api .

      - name: Type check API
        run: cd apps/api && uv run mypy .
