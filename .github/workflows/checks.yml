name: lint and format check

on:
  push:
    branches: ["main"]
    paths:
      - "**/*.py"
      - "**/pyproject.toml"
  pull_request:
    branches: ["main"]
    paths:
      - "**/*.py"
      - "**/pyproject.toml"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@c452423b2c42b215b0b2c5c6f98322aaea91c771 # v7.2.0
        with:
          version: "0.9.10"

      - run: uv python install 3.13.7

      - name: Install workspace dependencies
        run: uv sync --all-packages --extra dev

      - name: Install API dependencies
        run: cd apps/api && uv sync --extra dev

      - uses: astral-sh/ruff-action@deb632007bfb6d4a15bb00646af6eb714a34f079 # v3.5.1
        with:
          args: "format --check --diff"

      - uses: astral-sh/ruff-action@deb632007bfb6d4a15bb00646af6eb714a34f079 # v3.5.1
        with:
          args: "check"

      - name: Type check workspace
        run: uv run mypy --exclude apps/api .

      - name: Type check API
        run: cd apps/api && uv run mypy .
