name: lint and format check

on:
  push:
    branches: ["main"]
    paths:
      - "**/*.py"
      - "**/pyproject.toml"
  pull_request:
    branches: ["main"]
    paths:
      - "**/*.py"
      - "**/pyproject.toml"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@12d13f90bc3a5a1971bebad4beb09a4dfa962e91 # v8.1.0
        with:
          version: "0.11.16"

      - run: uv python install 3.14.5

      - name: Install workspace dependencies
        run: uv sync --all-packages --extra dev

      - name: Install API dependencies
        run: cd apps/api && uv sync --extra dev

      - uses: astral-sh/ruff-action@b4bf7655a00a34646c7ee0b458191f64d05e9ba2 # v4.0.0
        with:
          args: "format --check --diff"

      - uses: astral-sh/ruff-action@b4bf7655a00a34646c7ee0b458191f64d05e9ba2 # v4.0.0
        with:
          args: "check"

      - name: Type check workspace
        run: uv run mypy --exclude apps/api .

      - name: Type check API
        run: cd apps/api && uv run mypy .
