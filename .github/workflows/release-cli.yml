name: release-cli

on:
  push:
    tags: ["vcli-*.*.*"]

jobs:
  build-pkg:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.21"
          python-version: "3.14.6"

      - run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/vcli-}"
          CLI_PKG_VERSION=$(grep '^version = ' packages/cli/pyproject.toml | cut -d'"' -f2)
          if [ "$TAG_VERSION" != "$CLI_PKG_VERSION" ]; then
            echo "Tag $TAG_VERSION != cli package $CLI_PKG_VERSION"
            exit 1
          fi

      - run: uv build --package megaloader-cli

      - uses: actions/upload-artifact@v7
        with:
          name: cli-pkg-dist
          path: dist/*

  build-bin:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.21"
          python-version: "3.14.6"

      - run: uv venv

      - run: uv pip install -e packages/core -e packages/cli

      - run: uv pip install pyinstaller

      - run:
          uv run pyinstaller --onefile --name megaloader-cli-${{ matrix.os == 'ubuntu-latest' && 'linux' || 'windows' }} --paths
          packages/core packages/cli/megaloader_cli/main.py
        shell: bash

      - uses: actions/upload-artifact@v7
        with:
          name: cli-bin-${{ matrix.os }}
          path: dist/*

  pypi-cli:
    needs: build-pkg
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/project/megaloader-cli

    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: cli-pkg-dist
          path: dist

      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.0
        with:
          packages-dir: dist/
          print-hash: true

  github:
    needs: [build-pkg, build-bin]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: cli-pkg-dist
          path: dist
      - uses: actions/download-artifact@v8
        with:
          name: cli-bin-ubuntu-latest
          path: dist
      - uses: actions/download-artifact@v8
        with:
          name: cli-bin-windows-latest
          path: dist
      - uses: softprops/action-gh-release@132dbbba49e22bd4837f09b46d32a8edaf6baa58 # v3.0.1
        with:
          files: dist/*
          generate_release_notes: true
